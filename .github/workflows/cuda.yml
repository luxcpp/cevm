# CUDA CI — compile and test EVM CUDA kernels on T4 hardware.
# Runs on the lux-gpu-ci EKS cluster (Karpenter-managed g4dn.xlarge spot).
# Runner labels: self-hosted, linux, amd64, cuda, gpu, t4
# See: https://github.com/luxfi/lux-gpu-ci
name: CUDA EVM

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/evm/gpu/cuda/**'
      - 'lib/evm/gpu/go_bridge.*'
      - 'lib/evm/gpu/gpu_dispatch.*'
      - 'lib/evm/CMakeLists.txt'
      - 'CMakeLists.txt'
      - '.github/workflows/cuda.yml'
  pull_request:
    paths:
      - 'lib/evm/gpu/cuda/**'
      - 'lib/evm/CMakeLists.txt'
      - '.github/workflows/cuda.yml'
  workflow_dispatch:

jobs:
  cuda-compile:
    name: Compile CUDA kernels (sm_75 + sm_80 + sm_90)
    runs-on: [self-hosted, linux, amd64, cuda, gpu]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Show toolchain
        run: |
          nvcc --version
          cmake --version
          nvidia-smi || true

      - name: Configure (multi-arch)
        run: |
          cmake -B build \
            -DEVMONE_CUDA=ON \
            -DEVMONE_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_ARCHITECTURES="75;80;90"

      - name: Build evm-cuda kernels
        run: cmake --build build --target evm-cuda -j

      - name: Build evm-gpu (with EVM_CUDA defined)
        run: cmake --build build --target evm-gpu -j

      - name: Verify CUDA symbols in libevm-cuda.a
        run: |
          ar t build/lib/evm/libevm-cuda.a | sort
          nm build/lib/evm/libevm-cuda.a | grep -E "(keccak|tx_validate|state_table|block_stm|evm_kernel)" | head -20 || true

      - name: Verify EVM_CUDA define propagated to evm-gpu
        run: |
          nm build/lib/evm/libevm-gpu.a 2>&1 | grep -E "compute_state_root_cuda_direct|cuda::EvmKernel" | head -10 || true

      - name: Build C++ benchmarks
        run: cmake --build build --target evm-bench-block evm-bench-kernel -j || true

  cuda-test:
    name: Run kernels on T4 GPU + cevm Go tests
    needs: cuda-compile
    runs-on: [self-hosted, linux, amd64, cuda, gpu, t4]
    timeout-minutes: 30
    steps:
      - name: Checkout luxcpp/evm
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: luxcpp-evm

      - name: Checkout cevm
        uses: actions/checkout@v4
        with:
          repository: luxfi/cevm
          path: cevm

      - name: Build luxcpp/evm with CUDA (T4 = sm_75)
        run: |
          cd luxcpp-evm
          cmake -B build -DEVMONE_CUDA=ON -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_ARCHITECTURES="75"
          cmake --build build --target evm-gpu evm-cuda evm-kernel evm-bench-kernel -j

      - name: Run CUDA bytecode benchmark on T4
        run: |
          cd luxcpp-evm
          if [ -x build/lib/evm/evm-bench-kernel ]; then
            build/lib/evm/evm-bench-kernel
          else
            echo "evm-bench-kernel not built — failing"
            exit 1
          fi

      - name: Build cevm with CGO + CUDA
        env:
          CGO_ENABLED: '1'
        run: |
          cd cevm
          export CGO_LDFLAGS="-L../luxcpp-evm/build/lib/evm -L../luxcpp-evm/build/lib/evm/luxcpp-gpu -L../luxcpp-evm/build/lib -levm-gpu -levm-cuda -lluxgpu -levm -lstdc++"
          go build -v ./...

      - name: Run cevm tests with CUDA backend
        env:
          CGO_ENABLED: '1'
          GOWORK: 'off'
        run: |
          cd cevm
          export CGO_LDFLAGS="-L../luxcpp-evm/build/lib/evm -L../luxcpp-evm/build/lib/evm/luxcpp-gpu -L../luxcpp-evm/build/lib -levm-gpu -levm-cuda -lluxgpu -levm -lstdc++"
          go test -v ./...
